<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Hopfenwandertag 2026 - Essen</title>
    <link rel="canonical" href="https://sejoeg.github.io/Hopfenwandertag/">
    <link rel="manifest" href="./manifest.webmanifest">
    <link rel="apple-touch-icon" href="./img/logo.png">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-status-bar-style" content="black">
    <meta name="mobile-web-app-title" content="HWT 2026">
    <meta name="theme-color" content="#ffffff">
    <style>
        :root {
            --font-scale: 1;
            --bg: #f7f7f4;
            --surface: #ffffff;
            --text: #111111;
            --muted: #555555;
            --border: #d6d6d0;
            --focus: #123d8c;
            --danger: #b21e2b;
            --danger-active: #8f1520;
        }

        * {
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            min-height: 100dvh;
            margin: 0;
            padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
            background: var(--bg);
            color: var(--text);
            font-family: Arial, sans-serif;
            font-size: calc(16px * var(--font-scale));
        }

        button,
        input,
        select {
            font: inherit;
        }

        button {
            min-height: 3rem;
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text);
            cursor: pointer;
            touch-action: manipulation;
        }

        button:focus-visible,
        input:focus-visible,
        select:focus-visible {
            outline: 4px solid var(--focus);
            outline-offset: 2px;
        }

        .sr-only {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            white-space: nowrap;
            border: 0;
        }

        .app {
            display: grid;
            gap: 0.75rem;
            width: min(100%, 112rem);
            min-height: 100vh;
            min-height: 100dvh;
            margin: 0 auto;
            padding: 0.75rem;
        }

        .items {
            display: grid;
            grid-template-columns: 1fr;
            gap: 0.65rem;
            align-content: start;
        }

        .item-button {
            position: relative;
            display: grid;
            gap: 0.35rem;
            width: 100%;
            min-height: 5.6rem;
            padding: 0.85rem;
            text-align: left;
            font-size: 1.5em;
            font-weight: 700;
            line-height: 1.15;
        }

        .item-button.item-added {
            animation: item-added 180ms ease-out;
        }

        .item-count {
            position: absolute;
            right: 0.45rem;
            bottom: 0.45rem;
            display: none;
            min-width: 1.65rem;
            min-height: 1.65rem;
            padding: 0.1rem 0.35rem;
            border: 2px solid rgba(255, 255, 255, 0.9);
            border-radius: 999px;
            background: #111111;
            color: #ffffff;
            font-size: 0.55em;
            font-weight: 800;
            line-height: 1.2;
            text-align: center;
            align-content: center;
            box-shadow: 0 1px 4px rgba(0, 0, 0, 0.25);
        }

        .item-count.is-visible {
            display: grid;
        }

        @keyframes item-added {
            0% {
                transform: scale(1);
                box-shadow: 0 0 0 rgba(0, 0, 0, 0);
            }
            45% {
                transform: scale(0.97);
                box-shadow: inset 0 0 0 4px rgba(255, 255, 255, 0.85);
            }
            100% {
                transform: scale(1);
                box-shadow: 0 0 0 rgba(0, 0, 0, 0);
            }
        }

        .item-meta {
            display: flex;
            justify-content: flex-start;
            gap: 0.5rem;
            color: #1f1f1f;
            font-size: 0.75em;
            font-weight: 700;
            line-height: 1.15;
        }

        .order-panel {
            display: grid;
            gap: 0.75rem;
            align-content: start;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 0.75rem;
        }

        .header {
            display: grid;
            gap: 0.75rem;
        }

        .totals {
            display: grid;
            gap: 0.5rem;
        }

        .total {
            font-size: 1.8em;
            font-weight: 800;
        }

        .payment-row {
            display: grid;
            grid-template-columns: auto minmax(6rem, 8rem);
            gap: 0.5rem;
            align-items: center;
        }

        .payment-row label {
            font-size: 1.45em;
            font-weight: 800;
        }

        .payment-row input {
            width: 100%;
            border: 2px solid var(--text);
            border-radius: 6px;
            padding: 0.45rem;
            text-align: right;
            font-size: 1.6em;
            font-weight: 800;
        }

        .cash-row {
            display: grid;
            gap: 0.35rem;
            align-items: center;
        }

        .change {
            font-size: 1.55em;
            font-weight: 800;
        }

        .reset-button {
            width: 100%;
            min-height: 4rem;
            background: var(--danger);
            color: #ffffff;
            border-color: var(--danger);
            border-width: 12px;
            font-size: 1.85em;
            font-weight: 800;
        }

        .reset-button:active {
            background: var(--danger-active);
        }

        .order-list {
            display: grid;
            gap: 0.4rem;
        }

        .order-item {
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 0.5rem;
            align-items: center;
            width: 100%;
            min-height: 3.6rem;
            padding: 0.65rem;
            text-align: left;
            font-size: 1.125em;
            font-weight: 700;
        }

        .order-item-sum {
            min-width: 6.4rem;
            text-align: right;
        }

        .empty-order {
            color: var(--muted);
            font-weight: 700;
            padding: 0.75rem 0;
        }

        .toolbar {
            display: flex;
            flex-wrap: wrap;
            justify-content: flex-end;
            gap: 0.35rem;
            align-items: center;
            margin-top: 0.35rem;
        }

        .toolbar button {
            width: 2.35rem;
            min-height: 2.1rem;
            background: transparent;
            color: var(--muted);
            border-color: var(--border);
            font-size: 1rem;
            font-weight: 700;
            padding: 0;
        }

        .app-select {
            min-height: 2.1rem;
            max-width: 11rem;
            border: 1px solid var(--border);
            border-radius: 6px;
            background: var(--surface);
            color: var(--muted);
            font-size: 0.95rem;
            font-weight: 700;
            padding: 0 0.45rem;
        }

        .version {
            color: var(--muted);
            font-size: 0.85rem;
        }

        .color-white { background-color: #ffffff; }
        .color-dark-brown { background-color: #8a4b08; color: #ffffff; }
        .color-light-brown { background-color: #df7401; }
        .color-blue { background-color: #0080ff; }
        .color-green { background-color: #00d900; }
        .color-red { background-color: #e00000; color: #ffffff; }
        .color-yellow { background-color: #ffff00; }

        .color-bier-gross { background-color: #c5e1a5; }
        .color-bier-klein { background-color: #eceff1; }
        
        .color-alkoholfrei-suess { background-color: #90caf9; }
        .color-alkoholfrei-wasser { background-color: #d1f3d5; }
        
        .color-kuchen { background-color: #c5e1a5; }
        .color-torte { background-color: #eceff1; }
        .color-kaffee { background-color: #90caf9; }

        .color-geschirrpfand { background-color: #ffbf00; }
        .color-geschirrpfand-zurueck { background-color: #ffbf00; }
        .color-glaspfand { background-color: #d7ccc8; }
        .color-flaschenpfand { background-color: #ffcc80; }
        .color-glaspfand-zurueck { background-color: #d7ccc8; }
        .color-flaschenpfand-zurueck { background-color: #ffcc80; }
        .color-kuchenpfand { background-color: #ffcc80; }

        .color-vesper-gross { background-color: #f4d5f8; }
        .color-vesper-klein { background-color: #ffe0b2; }
        .color-wecken { background-color: #faf6c2; }

        .color-dark-brown .item-meta,
        .color-red .item-meta {
            color: #ffffff;
        }

        @media (min-width: 38rem) {
            .items {
                grid-template-columns: repeat(2, minmax(0, 1fr));
                gap: 0.75rem;
            }

            .item-button {
                min-height: 6.4rem;
                padding: 1rem;
            }

            .header {
                grid-template-columns: 1fr auto;
                align-items: start;
            }

            .cash-row {
                grid-template-columns: auto minmax(9rem, 1fr);
                column-gap: 1rem;
            }

            .reset-button {
                width: auto;
                min-width: 7rem;
            }
        }

        @media (min-width: 64rem) {
            .app {
                grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
                align-items: start;
            }

            .order-panel {
                position: sticky;
                top: 0.75rem;
            }
        }
    </style>
</head>
<body>
    <main class="app" aria-label="MVL Kassen App">
        <section aria-label="Artikel">
            <div class="items" id="itemList"></div>
            <div class="toolbar" aria-label="Anzeige">
                <label class="sr-only" for="appSelector">App-Version</label>
                <select class="app-select" id="appSelector" aria-label="App-Version"></select>
                <button type="button" id="zoomIn" aria-label="Ansicht vergrößern">+</button>
                <button type="button" id="zoomOut" aria-label="Ansicht verkleinern">-</button>
                <span class="version">V70</span>
            </div>
        </section>

        <section class="order-panel" aria-label="Bestellung">
            <div class="header">
                <div class="totals">
                    <div class="total" id="orderTotalTop" aria-live="polite">Gesamt: 0.00€</div>
                    <div class="cash-row">
                        <div class="payment-row">
                            <label for="paid">Bar:</label>
                            <input class="input-paid" type="number" id="paid" step="0.01" min="0" inputmode="decimal" autocomplete="off">
                        </div>
                        <div class="change" id="change" aria-live="polite">Zurück: ---</div>
                    </div>
                </div>
                <button class="reset-button" type="button" id="resetOrder">Neu</button>
            </div>
            <div class="order-list" id="orderList" aria-live="polite"></div>
        </section>
    </main>

    <script>
        const DEFAULT_APP_ID = "essen";
        const appConfigs = {
            essen: {
                title: "Hopfenwandertag 2026 - Essen",
                shortTitle: "HWT Essen",
                orderLabel: "Bestellung Essen",
                itemLabel: "Speisen",
                items: [
                    { id: "gyros-pommes", name: "Gyros mit Pommes, Zaziki und Weißkrautsalat", label: "Gyros Pommes", priceCents: 1000, color: "color-white", depositItemId: "speiseteller" },
                    { id: "gyros-wecken", name: "Gyros mit Wecken, Zaziki und Weißkrautsalat", label: "Gyros Wecken", priceCents: 800, color: "color-blue" },
                    { id: "steak-pommes", name: "Steak mit Pommes oder Kartoffelsalat", label: "Steak Pommes / Kartoffelsalat", priceCents: 900, color: "color-light-brown", depositItemId: "speiseteller" },
                    { id: "steak-wecken", name: "Steak im Wecken", label: "Steak Wecken", priceCents: 550, color: "color-dark-brown" },
                    { id: "currywurst-pommes", name: "Currywurst mit Pommes", label: "Currywurst Pommes", priceCents: 800, color: "color-blue" },
                    { id: "currywurst-wecken", name: "Currywurst mit Wecken", label: "Currywurst Wecken", priceCents: 500, color: "color-green" },
                    { id: "maultaschen", name: "Vegetarische Maultaschen mit Kartoffelsalat", label: "Maultaschen Kartoffelsalat", priceCents: 800, color: "color-blue", depositItemId: "speiseteller" },
                    { id: "wurst-wecken", name: "Rote/Weiße Wurst im Wecken", label: "Wurst Wecken", priceCents: 400, color: "color-red" },
                    { id: "pommes", name: "Portion Pommes oder Kartoffelsalat", label: "Pommes / Kartoffelsalat", priceCents: 300, color: "color-yellow" }
                ],
                depositItems: [
                    { id: "speiseteller", name: "Speiseteller inkl. Besteck", label: "Teller Besteck 🍽️", priceCents: 300, color: "color-geschirrpfand", icon: "🍽️️" }
                ]
            },
            bierstand: {
                title: "Hopfenwandertag 2026 - Bierstand",
                shortTitle: "HWT Bierstand",
                orderLabel: "Bestellung Bierstand",
                itemLabel: "Bierstand",
                items: [
                    { id: "bier-gross", name: "Bier / Radler / Weizen / Alkoholfrei 0,5 l", label: "Bier / Radler / Weizen / Alkoholfrei 0,5 l", priceCents: 400, color: "color-bier-gross", depositItemId: "glaspfand" },
                    { id: "bier-klein", name: "Bier / Radler / Weizen / Alkoholfrei 0,2 l", label: "Bier / Radler / Weizen / Alkoholfrei 0,2 l", priceCents: 250, color: "color-bier-klein" },
                    { id: "glas-zurueck", name: "Glas zurück 0,5 l", label: "Glas zurück 0,5 l 🍺", priceCents: -300, color: "color-glaspfand-zurueck" }
                ],
                depositItems: [
                    { id: "glaspfand", name: "Glaspfand 0,5 l", label: "Glaspfand 0,5 l 🍺", priceCents: 300, color: "color-glaspfand", icon: "🍺" }
                ]
            },
            alkoholfrei: {
                title: "Hopfenwandertag 2026 - Alkoholfrei",
                shortTitle: "HWT Alkoholfrei",
                orderLabel: "Bestellung",
                itemLabel: "Alkoholfrei",
                items: [
                    { id: "alkfrei-suess", name: "Apfelschorle / Fanta / Cola / Spezi", label: "Apfelschorle / Fanta / Cola / Spezi", priceCents: 300, color: "color-alkoholfrei-suess", depositItemId: "flaschenpfand" },
                    { id: "wasser", name: "Mineralwasser", label: "Mineralwasser", priceCents: 250, color: "color-alkoholfrei-wasser", depositItemId: "flaschenpfand" },
                    { id: "flasche-zurueck", name: "Flasche zurück", label: "Flasche zurück 🍾", priceCents: -100, color: "color-flaschenpfand-zurueck" }
                ],
                depositItems: [
                    { id: "flaschenpfand", name: "Flaschenpfand", label: "Flaschenpfand 🍾", priceCents: 100, color: "color-flaschenpfand", icon: "🍾" }
                ]
            },
            kaffee: {
                title: "Hopfenwandertag 2026 - Kaffee & Kuchen",
                shortTitle: "HWT Kaffee & Kuchen",
                orderLabel: "Bestellung",
                itemLabel: "Kaffee & Kuchen",
                items: [
                    { id: "kuchen", name: "Stück Kuchen", label: "Kuchen", priceCents: 300, color: "color-kuchen", depositItemId: "kuchenpfand" },
                    { id: "torte", name: "Stück Torte", label: "Torte", priceCents: 350, color: "color-torte", depositItemId: "kuchenpfand" },
                    { id: "kaffee", name: "Tasse Kaffee", label: "Kaffee", priceCents: 200, color: "color-kaffee", depositItemId: "kuchenpfand" }
                ],
                depositItems: [
                    { id: "kuchenpfand", name: "Kuchenteller / Kaffeetasse mit Löffel/Gabel", label: "Teller / Tasse + Besteck 🍽️", priceCents: 100, color: "color-kuchenpfand", icon: "🍽️" }
                ]
            }/*,
            feierabendhock: {
                title: "Feierabendhock 2026",
                shortTitle: "Feierabendhock",
                orderLabel: "Bestellung",
                itemLabel: "Getränke / Essen",
                items: [
                    { id: "bier-gross", name: "Bier / Radler / Weizen / Alkoholfrei 0,5 l", label: "Bier / Radler / Weizen / Alkoholfrei 0,5 l", priceCents: 400, color: "color-bier-gross" },
                    { id: "bier-klein", name: "Most rot / weiß sauer gespritzt 0,33 l", label: "Most rot / weiß sauer gespritzt 0,33 l", priceCents: 300, color: "color-bier-klein" },
                    { id: "alkfrei-suess", name: "Apfelschorle / Fanta / Cola / Spezi", label: "Apfelschorle / Fanta / Cola / Spezi", priceCents: 300, color: "color-alkoholfrei-suess" },
                    { id: "wasser", name: "Mineralwasser", label: "Mineralwasser", priceCents: 250, color: "color-alkoholfrei-wasser" },
                    { id: "vesper-gross", name: "Wurstsalat / Saurer Käs / Halb Halb / Kassler groß", label: "Wurstsalat / Saurer Käs / Halb Halb / Kassler groß", priceCents: 800, color: "color-vesper-gross" },
                    { id: "vesper-klein", name: "Wurstsalat / Saurer Käs / Halb Halb klein", label: "Wurstsalat / Saurer Käs / Halb Halb klein", priceCents: 600, color: "color-vesper-klein" },
                    { id: "wecken", name: "Wecken", label: "Wurstwecken / Käsewecken", priceCents: 250, color: "color-wecken" }
                ],
                depositItems: [
                ]
            }*/
        };

        const order = new Map();
        let activeConfig = appConfigs[DEFAULT_APP_ID];
        let items = [];
        let itemById = new Map();
        let depositItemById = new Map();
        let itemOrder = new Map();
        let zoomLevel = 1;
        let totalCents = 0;

        const appRoot = document.querySelector(".app");
        const articleSection = document.querySelector("[aria-label='Artikel']");
        const orderPanel = document.querySelector(".order-panel");
        const appSelector = document.getElementById("appSelector");
        const itemList = document.getElementById("itemList");
        const orderList = document.getElementById("orderList");
        const orderTotalTop = document.getElementById("orderTotalTop");
        const paidInput = document.getElementById("paid");
        const changeOutput = document.getElementById("change");

        function formatEuro(cents) {
            return `${(cents / 100).toFixed(2)}€`;
        }

        function getInitialAppId() {
            const params = new URLSearchParams(window.location.search);
            const requestedApp = params.get("app");
            return appConfigs[requestedApp] ? requestedApp : DEFAULT_APP_ID;
        }

        function configureApp(appId) {
            activeConfig = appConfigs[appId] || appConfigs[DEFAULT_APP_ID];
            items = [...activeConfig.items, ...activeConfig.depositItems];
            itemById = new Map(items.map(item => [item.id, item]));
            depositItemById = new Map(activeConfig.depositItems.map(item => [item.id, item]));
            itemOrder = new Map(items.map((item, index) => [item.id, index]));
        }

        function updateAppMetadata() {
            document.title = activeConfig.title;
            appRoot.setAttribute("aria-label", `${activeConfig.title} Kasse`);
            articleSection.setAttribute("aria-label", activeConfig.itemLabel);
            orderPanel.setAttribute("aria-label", activeConfig.orderLabel);

            const mobileTitle = document.querySelector("meta[name='mobile-web-app-title']");
            if (mobileTitle) {
                mobileTitle.setAttribute("content", activeConfig.shortTitle);
            }
        }

        function renderAppSelector(activeAppId) {
            const fragment = document.createDocumentFragment();

            Object.entries(appConfigs).forEach(([appId, config]) => {
                const option = document.createElement("option");
                option.value = appId;
                option.textContent = config.shortTitle;
                fragment.appendChild(option);
            });

            appSelector.replaceChildren(fragment);
            appSelector.value = activeAppId;
        }

        function setActiveApp(appId, updateUrl = true) {
            const nextAppId = appConfigs[appId] ? appId : DEFAULT_APP_ID;
            configureApp(nextAppId);
            updateAppMetadata();
            renderAppSelector(nextAppId);
            order.clear();
            totalCents = 0;
            paidInput.value = "";
            renderItems();
            updateOrder();

            if (updateUrl) {
                const url = new URL(window.location.href);
                url.searchParams.set("app", nextAppId);
                window.history.replaceState({}, "", url);
            }
        }

        function addItem(id) {
            const item = itemById.get(id);
            if (!item) {
                return;
            }

            increaseQuantity(item.id);
            if (item.depositItemId && depositItemById.has(item.depositItemId)) {
                increaseQuantity(item.depositItemId);
            }
            updateOrder();
        }

        function increaseQuantity(id) {
            const current = order.get(id) || 0;
            order.set(id, current + 1);
        }

        function removeItem(id) {
            const current = order.get(id) || 0;
            if (current <= 1) {
                order.delete(id);
            } else {
                order.set(id, current - 1);
            }
            updateOrder();
        }

        function orderedItems() {
            return items.filter(item => order.has(item.id)).sort((a, b) => {
                const aIsDeposit = depositItemById.has(a.id);
                const bIsDeposit = depositItemById.has(b.id);
                if (aIsDeposit && !bIsDeposit) return 1;
                if (!aIsDeposit && bIsDeposit) return -1;
                return itemOrder.get(a.id) - itemOrder.get(b.id);
            });
        }

        function updateOrder() {
            const fragment = document.createDocumentFragment();
            totalCents = 0;

            orderList.replaceChildren();

            const currentItems = orderedItems();
            if (currentItems.length === 0) {
                const empty = document.createElement("div");
                empty.className = "empty-order";
                empty.textContent = "Noch keine Artikel";
                orderList.appendChild(empty);
            }

            currentItems.forEach(item => {
                const quantity = order.get(item.id);
                const sumCents = item.priceCents * quantity;
                totalCents += sumCents;

                const button = document.createElement("button");
                button.type = "button";
                button.className = `order-item ${item.color}`;
                button.setAttribute("aria-label", `${item.name} entfernen`);
                button.addEventListener("click", () => removeItem(item.id));

                const name = document.createElement("span");
                name.className = "order-item-name";
                name.textContent = item.name;

                const sum = document.createElement("span");
                sum.className = "order-item-sum";
                sum.textContent = `${quantity}x ${formatEuro(sumCents)}`;

                button.append(name, sum);
                fragment.appendChild(button);
            });

            orderList.appendChild(fragment);
            orderTotalTop.textContent = `Gesamt: ${formatEuro(totalCents)}`;
            updateItemCounts();
            calculateChange();
        }

        function resetOrder() {
            order.clear();
            totalCents = 0;
            paidInput.value = "";
            updateOrder();
        }

        function setZoom(delta) {
            zoomLevel = Math.max(0.85, Number((zoomLevel + delta).toFixed(2)));
            document.documentElement.style.setProperty("--font-scale", zoomLevel);
        }

        function calculateChange() {
            const paid = Number.parseFloat(paidInput.value.replace(",", "."));
            const paidCents = Math.round(paid * 100);

            if (!Number.isFinite(paidCents) || paidCents < totalCents) {
                changeOutput.textContent = "Zurück: ---";
                return;
            }

            changeOutput.textContent = `Zurück: ${formatEuro(paidCents - totalCents)}`;
        }

        function renderItems() {
            const fragment = document.createDocumentFragment();
            itemList.replaceChildren();

            items.forEach(item => {
                const wrapper = document.createElement("div");
                const button = document.createElement("button");
                const label = document.createElement("span");
                const meta = document.createElement("span");
                const price = document.createElement("span");
                const count = document.createElement("span");
                const depositItem = depositItemById.get(item.depositItemId);

                button.type = "button";
                button.className = `item-button ${item.color}`;
                button.dataset.itemId = item.id;
                button.setAttribute("aria-label", `${item.name} hinzufügen`);

                label.textContent = item.label;
                price.textContent = `${formatEuro(item.priceCents)}${depositItem ? ` + ${depositItem.icon}` : ""}`;
                meta.className = "item-meta";
                meta.appendChild(price);
                count.className = "item-count";
                count.setAttribute("aria-hidden", "true");

                button.append(label, meta, count);
                wrapper.appendChild(button);
                fragment.appendChild(wrapper);
            });

            itemList.appendChild(fragment);
            updateItemCounts();
        }

        function updateItemCounts() {
            itemList.querySelectorAll("[data-item-id]").forEach(button => {
                const quantity = order.get(button.dataset.itemId) || 0;
                const count = button.querySelector(".item-count");
                if (!count) {
                    return;
                }

                count.textContent = quantity;
                count.classList.toggle("is-visible", quantity > 0);
            });
        }

        function animateItemAdded(button) {
            button.classList.remove("item-added");
            void button.offsetWidth;
            button.classList.add("item-added");
        }

        document.getElementById("resetOrder").addEventListener("click", resetOrder);
        document.getElementById("zoomIn").addEventListener("click", () => setZoom(0.1));
        document.getElementById("zoomOut").addEventListener("click", () => setZoom(-0.1));
        appSelector.addEventListener("change", event => setActiveApp(event.target.value));
        itemList.addEventListener("click", event => {
            if (!(event.target instanceof Element)) {
                return;
            }

            const button = event.target.closest("[data-item-id]");
            if (button) {
                addItem(button.dataset.itemId);
                animateItemAdded(button);
            }
        });
        paidInput.addEventListener("input", calculateChange);

        setActiveApp(getInitialAppId(), false);

        if ("serviceWorker" in navigator) {
            navigator.serviceWorker.register("/Hopfenwandertag/cache.js", { scope: "/Hopfenwandertag/" })
                .catch(error => console.log("Service Worker Registrierung fehlgeschlagen:", error));
        }
    </script>
</body>
</html>
