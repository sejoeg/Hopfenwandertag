<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Hopfenwandertag 2026 - Essen</title>
    <link rel="canonical" href="https://sejoeg.github.io/Hopfenwandertag/">
    <link rel="manifest" href="./manifest.webmanifest">
    <link rel="apple-touch-icon" href="./img/logo.png">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-status-bar-style" content="black">
    <meta name="mobile-web-app-title" content="HWT 2026">
    <meta name="theme-color" content="#ffffff">
    <style>
        :root {
            --font-scale: 1;
            --bg: #f7f7f4;
            --surface: #ffffff;
            --text: #111111;
            --muted: #555555;
            --border: #d6d6d0;
            --focus: #123d8c;
            --danger: #b21e2b;
            --danger-active: #8f1520;
        }

        * {
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            min-height: 100dvh;
            margin: 0;
            padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
            background: var(--bg);
            color: var(--text);
            font-family: Arial, sans-serif;
            font-size: calc(16px * var(--font-scale));
        }

        button,
        input {
            font: inherit;
        }

        button {
            min-height: 3rem;
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text);
            cursor: pointer;
            touch-action: manipulation;
        }

        button:focus-visible,
        input:focus-visible {
            outline: 4px solid var(--focus);
            outline-offset: 2px;
        }

        .app {
            display: grid;
            gap: 0.75rem;
            width: min(100%, 112rem);
            min-height: 100vh;
            min-height: 100dvh;
            margin: 0 auto;
            padding: 0.75rem;
        }

        .items {
            display: grid;
            grid-template-columns: 1fr;
            gap: 0.65rem;
            align-content: start;
        }

        .item-button {
            display: grid;
            gap: 0.35rem;
            width: 100%;
            min-height: 5.6rem;
            padding: 0.85rem;
            text-align: left;
            font-size: 1.5em;
            font-weight: 700;
            line-height: 1.15;
        }

        .item-meta {
            display: flex;
            justify-content: flex-start;
            gap: 0.5rem;
            color: #1f1f1f;
            font-size: 0.75em;
            font-weight: 700;
            line-height: 1.15;
        }

        .order-panel {
            display: grid;
            gap: 0.75rem;
            align-content: start;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 0.75rem;
        }

        .header {
            display: grid;
            gap: 0.75rem;
        }

        .totals {
            display: grid;
            gap: 0.5rem;
        }

        .total {
            font-size: 1.8em;
            font-weight: 800;
        }

        .payment-row {
            display: grid;
            grid-template-columns: auto minmax(6rem, 8rem);
            gap: 0.5rem;
            align-items: center;
        }

        .payment-row label {
            font-size: 1.45em;
            font-weight: 800;
        }

        .payment-row input {
            width: 100%;
            border: 2px solid var(--text);
            border-radius: 6px;
            padding: 0.45rem;
            text-align: right;
            font-size: 1.6em;
            font-weight: 800;
        }

        .cash-row {
            display: grid;
            gap: 0.35rem;
            align-items: center;
        }

        .change {
            font-size: 1.55em;
            font-weight: 800;
        }

        .reset-button {
            width: 100%;
            min-height: 4rem;
            background: var(--danger);
            color: #ffffff;
            border-color: var(--danger);
            border-width: 4px;
            font-size: 1.85em;
            font-weight: 800;
        }

        .reset-button:active {
            background: var(--danger-active);
        }

        .order-list {
            display: grid;
            gap: 0.4rem;
        }

        .order-item {
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 0.5rem;
            align-items: center;
            width: 100%;
            min-height: 3.6rem;
            padding: 0.65rem;
            text-align: left;
            font-size: 1.125em;
            font-weight: 700;
        }

        .order-item-sum {
            min-width: 6.4rem;
            text-align: right;
        }

        .empty-order {
            color: var(--muted);
            font-weight: 700;
            padding: 0.75rem 0;
        }

        .toolbar {
            display: flex;
            flex-wrap: wrap;
            justify-content: flex-end;
            gap: 0.35rem;
            align-items: center;
            margin-top: 0.35rem;
        }

        .toolbar button {
            width: 2.35rem;
            min-height: 2.1rem;
            background: transparent;
            color: var(--muted);
            border-color: var(--border);
            font-size: 1rem;
            font-weight: 700;
            padding: 0;
        }

        .version {
            color: var(--muted);
            font-size: 0.85rem;
        }

        .color-gyros-pommes { background-color: #ffffff; }
        .color-gyros-wecken,
        .color-currywurst-pommes { background-color: #df7401; }
        .color-maultaschen,
        .color-steak-pommes { background-color: #0080ff; }
        .color-steak-wecken { background-color: #8a4b08; color: #ffffff; }
        .color-currywurst-wecken { background-color: #00d900; }
        .color-wurst-wecken { background-color: #e00000; color: #ffffff; }
        .color-pommes { background-color: #ffff00; }
        .color-pfand { background-color: #ffbf00; }

        .color-steak-wecken .item-meta,
        .color-wurst-wecken .item-meta {
            color: #ffffff;
        }

        @media (min-width: 38rem) {
            .items {
                grid-template-columns: repeat(2, minmax(0, 1fr));
                gap: 0.75rem;
            }

            .item-button {
                min-height: 6.4rem;
                padding: 1rem;
            }

            .header {
                grid-template-columns: 1fr auto;
                align-items: start;
            }

            .cash-row {
                grid-template-columns: auto minmax(9rem, 1fr);
                column-gap: 1rem;
            }

            .reset-button {
                width: auto;
                min-width: 7rem;
            }
        }

        @media (min-width: 64rem) {
            .app {
                grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
                align-items: start;
            }

            .order-panel {
                position: sticky;
                top: 0.75rem;
            }
        }
    </style>
</head>
<body>
    <main class="app" aria-label="Hopfenwandertag Kasse">
        <section aria-label="Artikel">
            <div class="items" id="itemList"></div>
            <div class="toolbar" aria-label="Anzeige">
                <button type="button" id="zoomIn" aria-label="Ansicht vergrößern">+</button>
                <button type="button" id="zoomOut" aria-label="Ansicht verkleinern">-</button>
                <span class="version">V44</span>
            </div>
        </section>

        <section class="order-panel" aria-label="Bestellung">
            <div class="header">
                <div class="totals">
                    <div class="total" id="orderTotalTop" aria-live="polite">Gesamt: 0.00€</div>
                    <div class="cash-row">
                        <div class="payment-row">
                            <label for="paid">Bar:</label>
                            <input class="input-paid" type="number" id="paid" step="0.01" min="0" inputmode="decimal" autocomplete="off">
                        </div>
                        <div class="change" id="change" aria-live="polite">Zurück: ---</div>
                    </div>
                </div>
                <button class="reset-button" type="button" id="resetOrder">Neu</button>
            </div>
            <div class="order-list" id="orderList" aria-live="polite"></div>
        </section>
    </main>

    <script>
        const DEPOSIT_ID = "pfand";
        const items = [
            { id: "gyros-pommes", name: "Gyros mit Pommes, Zaziki und Weißkrautsalat", label: "Gyros Pommes", priceCents: 900, color: "color-gyros-pommes", includesDeposit: true },
            { id: "gyros-wecken", name: "Gyros mit Wecken, Zaziki und Weißkrautsalat", label: "Gyros Wecken", priceCents: 700, color: "color-gyros-wecken" },
            { id: "steak-pommes", name: "Steak mit Pommes oder Kartoffelsalat", label: "Steak Pommes / Kartoffelsalat", priceCents: 800, color: "color-steak-pommes", includesDeposit: true },
            { id: "steak-wecken", name: "Steak im Wecken", label: "Steak Wecken", priceCents: 500, color: "color-steak-wecken" },
            { id: "currywurst-pommes", name: "Currywurst mit Pommes", label: "Currywurst Pommes", priceCents: 700, color: "color-currywurst-pommes" },
            { id: "currywurst-wecken", name: "Currywurst mit Wecken", label: "Currywurst Wecken", priceCents: 450, color: "color-currywurst-wecken" },
            { id: "maultaschen", name: "Vegetarische Maultaschen mit Kartoffelsalat", label: "Maultaschen Kartoffelsalat", priceCents: 800, color: "color-maultaschen", includesDeposit: true },
            { id: "wurst-wecken", name: "Rote/Weiße Wurst im Wecken", label: "Wurst Wecken", priceCents: 400, color: "color-wurst-wecken" },
            { id: "pommes", name: "Portion Pommes oder Kartoffelsalat", label: "Pommes / Kartoffelsalat", priceCents: 300, color: "color-pommes" },
            { id: DEPOSIT_ID, name: "Speiseteller inkl. Besteck", label: "Teller Besteck 🍽", priceCents: 300, color: "color-pfand" }
        ];

        const order = new Map();
        let zoomLevel = 1;
        let totalCents = 0;

        const itemList = document.getElementById("itemList");
        const orderList = document.getElementById("orderList");
        const orderTotalTop = document.getElementById("orderTotalTop");
        const paidInput = document.getElementById("paid");
        const changeOutput = document.getElementById("change");

        function formatEuro(cents) {
            return `${(cents / 100).toFixed(2)}€`;
        }

        function addItem(id) {
            const item = items.find(entry => entry.id === id);
            if (!item) {
                return;
            }

            increaseQuantity(item.id);
            if (item.includesDeposit) {
                increaseQuantity(DEPOSIT_ID);
            }
            updateOrder();
        }

        function increaseQuantity(id) {
            const current = order.get(id) || 0;
            order.set(id, current + 1);
        }

        function removeItem(id) {
            const current = order.get(id) || 0;
            if (current <= 1) {
                order.delete(id);
            } else {
                order.set(id, current - 1);
            }
            updateOrder();
        }

        function orderedItems() {
            return items.filter(item => order.has(item.id)).sort((a, b) => {
                if (a.id === DEPOSIT_ID) return 1;
                if (b.id === DEPOSIT_ID) return -1;
                return items.indexOf(a) - items.indexOf(b);
            });
        }

        function updateOrder() {
            const fragment = document.createDocumentFragment();
            totalCents = 0;

            orderList.replaceChildren();

            const currentItems = orderedItems();
            if (currentItems.length === 0) {
                const empty = document.createElement("div");
                empty.className = "empty-order";
                empty.textContent = "Noch keine Artikel";
                orderList.appendChild(empty);
            }

            currentItems.forEach(item => {
                const quantity = order.get(item.id);
                const sumCents = item.priceCents * quantity;
                totalCents += sumCents;

                const button = document.createElement("button");
                button.type = "button";
                button.className = `order-item ${item.color}`;
                button.setAttribute("aria-label", `${item.name} entfernen`);
                button.addEventListener("click", () => removeItem(item.id));

                const name = document.createElement("span");
                name.className = "order-item-name";
                name.textContent = item.name;

                const sum = document.createElement("span");
                sum.className = "order-item-sum";
                sum.textContent = `${quantity}x ${formatEuro(sumCents)}`;

                button.append(name, sum);
                fragment.appendChild(button);
            });

            orderList.appendChild(fragment);
            orderTotalTop.textContent = `Gesamt: ${formatEuro(totalCents)}`;
            calculateChange();
        }

        function resetOrder() {
            order.clear();
            totalCents = 0;
            paidInput.value = "";
            updateOrder();
        }

        function setZoom(delta) {
            zoomLevel = Math.max(0.85, Number((zoomLevel + delta).toFixed(2)));
            document.documentElement.style.setProperty("--font-scale", zoomLevel);
        }

        function calculateChange() {
            const paid = Number.parseFloat(paidInput.value.replace(",", "."));
            const paidCents = Math.round(paid * 100);

            if (!Number.isFinite(paidCents) || paidCents < totalCents) {
                changeOutput.textContent = "Zurück: ---";
                return;
            }

            changeOutput.textContent = `Zurück: ${formatEuro(paidCents - totalCents)}`;
        }

        function renderItems() {
            const fragment = document.createDocumentFragment();

            items.forEach(item => {
                const wrapper = document.createElement("div");
                const button = document.createElement("button");
                const label = document.createElement("span");
                const meta = document.createElement("span");
                const price = document.createElement("span");

                button.type = "button";
                button.className = `item-button ${item.color}`;
                button.addEventListener("click", () => addItem(item.id));

                label.textContent = item.label;
                price.textContent = `${formatEuro(item.priceCents)}${item.includesDeposit ? " + 🍽" : ""}`;
                meta.className = "item-meta";
                meta.appendChild(price);

                button.append(label, meta);
                wrapper.appendChild(button);
                fragment.appendChild(wrapper);
            });

            itemList.appendChild(fragment);
        }

        document.getElementById("resetOrder").addEventListener("click", resetOrder);
        document.getElementById("zoomIn").addEventListener("click", () => setZoom(0.1));
        document.getElementById("zoomOut").addEventListener("click", () => setZoom(-0.1));
        paidInput.addEventListener("input", calculateChange);

        renderItems();
        updateOrder();

        if ("serviceWorker" in navigator) {
            navigator.serviceWorker.register("/Hopfenwandertag/cache.js", { scope: "/Hopfenwandertag/" })
                .catch(error => console.log("Service Worker Registrierung fehlgeschlagen:", error));
        }
    </script>
</body>
</html>
